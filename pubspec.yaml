name: mosquito_alert_app
description: A new Flutter project.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: none
# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 4.3.0+2930


environment:
  sdk: '>=3.12.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_maps_flutter: ^2.17.0
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  dio: ^5.8.0+1
  markdown: ^7.3.1
  firebase_messaging: ^16.4.1
  firebase_core: ^4.11.0
  auto_size_text: ^3.0.0
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.0
  intro_slider: ^4.2.5
  permission_handler: ^12.0.3
  language_picker: ^0.4.5
  overlay_support: ^2.1.0

  flutter_html: ^3.0.0
  webview_flutter: ^4.14.0
  workmanager: ^0.9.0+3
  battery_plus: ^7.0.0
  badges: ^3.2.0
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  image_picker: ^1.2.2
  photo_manager: ^3.9.0
  textfield_tags: ^3.0.1
  in_app_review: ^2.0.11
  firebase_analytics: ^12.4.3
  mosquito_alert:
    git:
      url: https://github.com/Mosquito-Alert/mosquito-alert-dart-sdk.git
      ref: 0.3.1
  flutter_secure_storage: ^10.0.0
  infinite_scroll_pagination: ^5.1.1
  provider: ^6.1.5
  built_collection: ^5.1.1
  app_set_id: ^1.4.0
  envied: ^1.3.4
  flutter_image_compress: ^2.4.0
  timeago: ^3.7.1
  intl: ^0.20.2
  html: ^0.15.6
  country_codes_plus: ^5.1.0
  path_provider: ^2.1.5
  json_annotation: ^4.11.0
  internet_connection_checker_plus: ^2.9.1+1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  synchronized: ^3.4.0

  built_value: any
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  envied_generator: ^1.3.4
  build_runner: ^2.13.1
  # dependency_validator: ^5.0.3
  json_serializable: ^6.13.1
  hive_ce_generator: ^1.11.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/img/mosquito_alert_logo_transparent.png"
  adaptive_icon_foreground: "assets/img/mosquito_alert_logo_transparent.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground_inset: 25
  adaptive_icon_monochrome: "assets/img/mosquito_alert_logo_monochrome.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"

flutter_native_splash:
  android: true
  ios: true
  color: "#ffffff"
  image: assets/img/mosquito_alert_splash.png
  # Branding aspect ratio must be: 5:2
  branding: assets/img/mosquito_alert_letters_aspectratio_5_2.png
  branding_mode: bottom
  branding_bottom_padding: 24
  fullscreen: false
  android_12:
    image: assets/img/mosquito_alert_splash.png
    color: "#ffffff"
    icon_background_color: "#ffffff"
    branding: assets/img/mosquito_alert_letters_aspectratio_5_2.png

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/img/
    - assets/img/location/
    - assets/img/sendmodule/
    - assets/img/gallery/
    - assets/img/bottoms/
    - assets/language/
    - assets/html/
    - assets/config/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
